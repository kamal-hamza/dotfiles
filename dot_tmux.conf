# vim mode in tmux
setw -g mode-keys vi

# Enable mouse support
set -g mouse on

# Set prefix key to Ctrl+s (default is Ctrl+b)
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Enable 256-color mode and true color support
set -ga terminal-features ",xterm-256color:RGB"
set -g default-terminal "tmux-256color"

# Cursor shape
set -as terminal-overrides '*:Se=\E[6 q'

# Split panes
bind v split-window -h -c "#{pane_current_path}"
bind b split-window -v -c "#{pane_current_path}"

# extended keys for pi agent
set -g extended-keys on
set -g extended-keys-format csi-u

# Disable confirmation for killing a pane/window
unbind x
unbind X
unbind &
bind x kill-pane
bind X kill-session
bind & kill-window

# Session keybinds
unbind n
unbind p
bind n switch-client -n
bind p switch-client -p

# Window keybinds
unbind l
unbind k
unbind r
bind l next-window
bind k previous-window
bind r command-prompt "rename-window '%%'"

# Copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Copy mode colors from Neovim palette
set -g mode-style "fg=#101010,bg=#458ee6,bold"  # bg text on highlight (inverted)

# Smart pane switching with vim awareness
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '(nvim|vim|view|fzf)'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Restore clear screen keybind
bind C-l send-keys C-l

# Start window numbering from 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 10000

# Status bar position
set -g status-position bottom
set -g status-interval 1

# Status bar colors from Neovim palette
set -g status-style "fg=#b0b0b0,bg=#101010"  # fg on bg
set -g message-style "fg=#ffffff,bg=#272727"  # border/emphasis on line
set -g message-command-style "fg=#d9ba73,bg=#272727"  # warning on line

# Status bar lengths
set -g status-left-length 100
set -g status-right-length 100

# Source theme file
if-shell '[ -f ~/.config/tmux/themes/theme.tmux ]' \
    "source-file ~/.config/tmux/themes/theme.tmux"

# Status left: session name (dark mode)
# Colors from Neovim palette: fg=#b0b0b0, bg=#458ee6 (highlight)
set -g status-left "#[fg=#101010,bg=#458ee6,bold] #S #[default] "

# Status right: current path and time (dark mode)
# Colors from Neovim palette: highlight=#458ee6, line=#272727, keyword=#777777
set -g status-right "#[fg=#458ee6]#{=/-32/...:#{b:pane_current_path}} #[fg=#272727]│#[fg=#777777] %H:%M "

# Window status format
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-separator ""

# Window status colors from Neovim palette
set -g window-status-style "fg=#777777,bg=#101010"  # keyword on bg
set -g window-status-current-style "fg=#458ee6,bg=#101010,bold"  # highlight on bg
set -g window-status-activity-style "fg=#ff7676,bg=#101010"  # danger on bg

# Pane border colors from Neovim palette
set -g pane-border-style "fg=#272727"  # line color
set -g pane-active-border-style "fg=#458ee6"  # highlight color

# Toggle tmux status bar with prefix + \
bind '\' set status

# Reload tmux config
bind R source-file ~/.tmux.conf \; display-message "Config reloaded!"
