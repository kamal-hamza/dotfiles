################################################################################
# MPD Configuration
################################################################################

## Directories
music_directory "~/Music"
playlist_directory "~/.config/mpd/playlists"
db_file "~/.config/mpd/database"
state_file "~/.config/mpd/state"

## Network Settings
bind_to_address "127.0.0.1"
port "6600"

## Scanning
auto_update "yes"

################################################################################
# Audio Outputs
################################################################################

## Primary Output - PipeWire (System Audio)
audio_output {
    type "pipewire"
    name "PipeWire"
}

## Visualizer Feed - FIFO Output
## Required for ncmpcpp spectrum visualizer
## Format: 44100:16:2 (44.1kHz, 16-bit, stereo)
audio_output {
    type "fifo"
    name "Visualizer feed"
    path "/tmp/mpd.fifo"
    format "44100:16:2"
}
