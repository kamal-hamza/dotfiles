# =============================================================================
# Satty Configuration - Screenshot Annotation Tool
# =============================================================================
# Satty is a tool for annotating screenshots with support for wayland
# GTK theming is handled by system theme settings
# Uses: grim (screenshot), slurp (region selection), wl-clipboard (clipboard)

[general]
# Increase or decrease the size of all annotations (default is 1)
annotation-size-factor = 1
# Actions to perform when Enter is pressed
actions-on-enter = ["save-to-clipboard", "save-to-file", "exit"]
# Actions to perform when Escape is pressed
actions-on-escape = ["exit"]
# Actions to perform when right-click (copy button) is pressed
actions-on-right-click = ["save-to-clipboard", "exit"]

[font]
# Font family and style for text annotations
family = "Monospace"
style = "Regular"

[color-palette]
# Custom monochrome colors from Neovim dark theme palette
# Uses standard hex codes.
custom = [
  "#050505", # Black (bg)
  "#272727", # Dark Gray (line)
  "#8d8d8d", # Medium Gray (keyword/comment)
  "#cfcfcf", # Light Gray (interactive_accent)
  "#ffffff", # White (fg_accent_hover)
]
