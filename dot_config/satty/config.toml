# =============================================================================
# Satty Configuration - Screenshot Annotation Tool
# =============================================================================
# Satty is a tool for annotating screenshots with support for wayland
# GTK theming is handled by system theme settings
# Uses: grim (screenshot), slurp (region selection), wl-clipboard (clipboard)

# Screenshot tool configuration
[tools.screenshot]
# Use grim for screenshots on Wayland
cmd = "grim"

# Selection tool configuration
[tools.selection]
# Use slurp for region selection on Wayland
cmd = "slurp"

# Clipboard configuration
[tools.clipboard]
# Use wl-clipboard for Wayland clipboard operations
copy_cmd = "wl-copy"
paste_cmd = "wl-paste"

# Default tool settings
[defaults]
# Tool used for taking initial screenshot
screenshot_tool = "grim"
# Tool used for region selection
selection_tool = "slurp"
# Font used in annotations
font = "Monospace"
# Font size for text annotations
font_size = 14
# Brush size for drawing
brush_size = 3

# UI behavior
[ui]
# Hide the UI on startup
hide_ui_on_startup = false
