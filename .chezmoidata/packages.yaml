packages:
   darwin:
        taps:
            - shaunsingh/SFMono-Nerd-Font-Ligaturized # SFMono Nerd Font with ligatures

        brews:
            - mise # Modern runtime version manager (replaces asdf)
            - python-yq # YAML processor (provides PyYAML for install-lang script)
            - bat # Cat with syntax highlighting
            - chezmoi # Dotfiles manager
            - fzf # Fuzzy finder for terminal
            - git # git version control
            - neovim # Modern vim-based text editor
            - tmux # Terminal multiplexer
            - ghostty # Terminal emulator
            - zsh-autopair # Auto-close brackets in zsh
            - zsh-autosuggestions # Fish-like autosuggestions
            - zsh-syntax-highlighting # Syntax highlighting for zsh
            - zoxide # Smarter cd command
            - gh # Github CLI
            - just # Just (Alternative to Make) - Command runner

        casks:
            - chatgpt # ChatGPT desktop app
            - obsidian # Knowledge management app
            - zed # Modern code editor
            - font-meslo-lg-nerd-font # Coding Font
            - whatsapp # WhatsApp
            - beekeeper-studio # SQL DBMS

   arch:
        pacman:
            - mise # Modern runtime version manager (replaces asdf)
            - python-pyaml # PyYAML library for install-lang script
            - bat # Cat with syntax highlighting
            - chezmoi # Dotfiles manager
            - fzf # Fuzzy finder for terminal
            - git # Version control system
            - neovim # Modern vim-based text editor
            - obsidian # Knowledge management app
            - tmux # Terminal multiplexer
            - ghostty # Terminal emulator
            - zed # Modern code editor
            - zsh # Z shell
            - zsh-autosuggestions # Fish-like autosuggestions
            - zsh-syntax-highlighting # Syntax highlighting for zsh
            - zoxide # Smarter cd command
            - github-cli # Github CLI
            - yq # YAML file handling
            - just # Just (Alternative to Make) - Command runner
            - thunar # file manager
            - gvfs # mount external storage
            - thunar-volman # volume manager plugin for thunar
            - thunar-archive-plugin # extraction plugin for thunar
            - tumbler # file thumbnailing service
            - xarchiver # extract or compress files
            - zip # zip files
            - unzip # unzip files
            - p7zip # another zip format
            - unrar # rar files
            - tar # tar files
            - gzip # more zip
            - bzip2 # zip2
            - xz # xz format
            - hyprland # The dynamic tiling Wayland compositor
            - xorg-xwayland # Compatibility layer for legacy X11 apps
            - qt6-wayland # Wayland support for Qt6 applications
            - qt5-wayland # Wayland support for Qt5 applications
            - waybar # Highly customizable status bar
            - rofi-wayland # app launcher
            - mako # Lightweight, customizable notification daemon
            - hyprpaper # Blazing fast, native wallpaper utility
            - polkit-gnome # Handles administrative authentication prompts (GUI)
            - xdg-desktop-portal-hyprland # Backend for backend-specific features (screensharing/file open)
            - xdg-desktop-portal-gtk # Fallback portal backend for file pickers/GTK themes
            - wl-clipboard # Command-line copy/paste utilities for Wayland
            - grim # Screenshot utility for Wayland
            - slurp # Select a region in a Wayland compositor (works perfectly with grim)
            - pipewire # Core multimedia framework (replaces PulseAudio/ALSA)
            - pipewire-pulse # PulseAudio compatibility layer for PipeWire
            - wireplumber # Modular session/policy manager for PipeWire
            - os-prober # dual boot OS recognition
            - firefox # browser
            - discord # chat
            - cava
            - playerctl
            - pavucontrol
            - bluez
            - bluez-utils
            - networkmanager
            - swaynotificationcenter
            - network-manager-applet

        aur:
            - chatgpt-desktop-bin # ChatGPT desktop app
            - zsh-autopair-git # Auto-close brackets in zs
            - hyprlock # Fast, secure, and beautiful desktop locker
            - hypridle # Idle management daemon (handles screen dims and locks)
            - blueberry

