# =============================================================================
# Development Tools Installation Configuration
# =============================================================================
# This file defines language tools and frameworks using a step-based approach
# that supports multiple package managers (mise, brew, yay, cargo, go, npm, etc.)
#
# Structure:
#   - Each language/framework has a list of "steps" executed in order
#   - Steps can use different installers: mise, yay, brew, cargo, go_install, etc.
#   - Dependencies are resolved automatically via "depends_on"
#
# Usage:
#   install-lang python         # Install Python and its tools
#   install-lang typescript     # Install TypeScript and Node.js
#   install-lang go rust        # Install multiple languages
# =============================================================================

languages:
  # =============================================================================
  # Python
  # =============================================================================
  python:
    steps:
      - mise:
          - python@latest
      - system:
          - uv
      - uv_tool:
          - ruff
          - pyrefly
          - debugpy
          - pytest
          - ipython

  # =============================================================================
  # JavaScript/TypeScript (via Bun)
  # =============================================================================
  javascript:
    depends_on:
      - bun
    steps:
      - bun_global:
          - prettier
          - eslint

  typescript:
    depends_on:
      - bun
    steps:
      - bun_global:
          - typescript
          - typescript-language-server
          - prettier
          - eslint

  bun:
    steps:
      - mise:
          - bun@latest

  # =============================================================================
  # Node.js (alternative to Bun)
  # =============================================================================
  node:
    steps:
      - mise:
          - node@lts
      - npm_global:
          - typescript
          - typescript-language-server
          - prettier
          - eslint

  # =============================================================================
  # Deno
  # =============================================================================
  deno:
    steps:
      - mise:
          - deno@latest

  # =============================================================================
  # Go
  # =============================================================================
  golang:
    steps:
      - mise:
          - go@latest
      - go_install:
          - golang.org/x/tools/gopls@latest
          - mvdan.cc/gofumpt@latest
          - github.com/go-delve/delve/cmd/dlv@latest
      - system:
          - golangci-lint

  # =============================================================================
  # Rust
  # =============================================================================
  rust:
    steps:
      - system:
          - rustup
      - custom_cmd:
          - rustup default stable
          - rustup component add rust-analyzer rustfmt clippy
      - cargo:
          - cargo-watch

  # =============================================================================
  # Zig
  # =============================================================================
  zig:
    steps:
      - mise:
          - zig@latest
      - system:
          - zls

  # =============================================================================
  # C/C++
  # =============================================================================
  cpp:
    steps:
      - system:
          - clang
          - llvm
          - cmake
      - mise:
          - clang-format@latest

  c:
    depends_on:
      - cpp

  # =============================================================================
  # C# / .NET
  # =============================================================================
  csharp:
    steps:
      - system:
          - dotnet-sdk
          - dotnet-runtime
      - dotnet_tool:
          - csharp-ls
          - fantomas
      - system:
          - netcoredbg

  dotnet:
    depends_on:
      - csharp

  # =============================================================================
  # Java
  # =============================================================================
  java:
    steps:
      - mise:
          - java@latest
      - system:
          - gradle
          - maven
      - custom_cmd:
          - mkdir -p ~/.local/share/eclipse.jdt.ls

  # =============================================================================
  # Kotlin
  # =============================================================================
  kotlin:
    depends_on:
      - java
    steps:
      - mise:
          - kotlin@latest
      - system:
          - gradle
          - ktlint

  # =============================================================================
  # Ruby
  # =============================================================================
  ruby:
    steps:
      - mise:
          - ruby@latest
      - gem:
          - bundler
          - ruby-lsp
          - rubocop
          - debug

  # =============================================================================
  # PHP
  # =============================================================================
  php:
    steps:
      - mise:
          - php@latest
          - composer@latest
      - composer_global:
          - phpstan/phpstan
          - friendsofphp/php-cs-fixer
      - system:
          - php-debug

  # =============================================================================
  # Elixir
  # =============================================================================
  elixir:
    steps:
      - mise:
          - erlang@latest
          - elixir@latest
      - custom_cmd:
          - mix local.hex --force
          - mix local.rebar --force
      - mix:
          - elixir_ls

  # =============================================================================
  # Lua
  # =============================================================================
  lua:
    steps:
      - mise:
          - lua@latest
      - system:
          - luarocks
          - lua-language-server
          - stylua
          - luacheck

  # =============================================================================
  # Dart
  # =============================================================================
  dart:
    steps:
      - mise:
          - dart@latest
      - system:
          - flutter

  # =============================================================================
  # Swift
  # =============================================================================
  swift:
    steps:
      - system:
          - swift
          - swift-format
          - swiftlint

  # =============================================================================
  # Shell Scripting
  # =============================================================================
  shell:
    steps:
      - system:
          - bash
          - shellcheck
          - shfmt
      - npm_global:
          - bash-language-server

  # =============================================================================
  # Configuration Languages
  # =============================================================================
  sql:
    steps:
      - system:
          - sqls
          - sql-formatter

  yaml:
    steps:
      - npm_global:
          - yaml-language-server
          - prettier
      - system:
          - yamllint

  toml:
    steps:
      - system:
          - taplo

  markdown:
    steps:
      - system:
          - marksman
      - npm_global:
          - markdownlint-cli
          - prettier

  json:
    steps:
      - npm_global:
          - vscode-langservers-extracted

  # =============================================================================
  # Infrastructure & DevOps
  # =============================================================================
  terraform:
    steps:
      - mise:
          - terraform@latest
          - tflint@latest

  ansible:
    steps:
      - system:
          - ansible
      - uv_tool:
          - ansible-lint

  docker:
    steps:
      - system:
          - docker
          - hadolint
      - npm_global:
          - dockerfile-language-server-nodejs

  kubernetes:
    steps:
      - system:
          - kubectl
          - helm
          - k9s

  # =============================================================================
  # Protocol Buffers & GraphQL
  # =============================================================================
  protobuf:
    steps:
      - system:
          - protobuf
          - buf

  graphql:
    steps:
      - npm_global:
          - graphql-language-service-cli
          - prettier

  # =============================================================================
  # Nix
  # =============================================================================
  nix:
    steps:
      - system:
          - nix
          - nil
          - nixpkgs-fmt

  # =============================================================================
  # Typst
  # =============================================================================
  typst:
    steps:
      - system:
          - typst
          - tinymist

  # =============================================================================
  # R
  # =============================================================================
  r:
    steps:
      - custom_cmd:
          - "bash -c 'if ! command -v R >/dev/null 2>&1; then brew install r; fi'"
      - custom_cmd:
          - R -e 'if (!requireNamespace("languageserver", quietly = TRUE)) install.packages("languageserver", repos = "https://cloud.r-project.org")'
          - R -e 'if (!requireNamespace("lintr", quietly = TRUE)) install.packages("lintr", repos = "https://cloud.r-project.org")'
          - R -e 'if (!requireNamespace("styler", quietly = TRUE)) install.packages("styler", repos = "https://cloud.r-project.org")'

# =============================================================================
# Frameworks
# =============================================================================
frameworks:
  # =============================================================================
  # Python Frameworks
  # =============================================================================
  django:
    depends_on:
      - python
    steps:
      - uv_tool:
          - django
          - django-stubs

  flask:
    depends_on:
      - python
    steps:
      - uv_tool:
          - flask
          - flask-cors

  fastapi:
    depends_on:
      - python
    steps:
      - uv_tool:
          - fastapi
          - uvicorn
          - pydantic

  # =============================================================================
  # JavaScript/TypeScript Frameworks
  # =============================================================================
  react:
    depends_on:
      - typescript
    steps:
      - bun_global:
          - create-react-app

  nextjs:
    depends_on:
      - typescript
    steps:
      - bun_global:
          - create-next-app

  vue:
    depends_on:
      - typescript
    steps:
      - bun_global:
          - "@vue/cli"

  nuxt:
    depends_on:
      - typescript
    steps:
      - bun_global:
          - nuxi

  angular:
    depends_on:
      - typescript
    steps:
      - bun_global:
          - "@angular/cli"

  svelte:
    depends_on:
      - typescript
    steps:
      - bun_global:
          - "@sveltejs/kit"

  express:
    depends_on:
      - typescript
    steps:
      - bun_global:
          - express-generator

  nestjs:
    depends_on:
      - typescript
    steps:
      - bun_global:
          - "@nestjs/cli"

  # =============================================================================
  # Go Frameworks
  # =============================================================================
  gin:
    depends_on:
      - golang
    steps:
      - go_install:
          - github.com/gin-gonic/gin@latest

  echo:
    depends_on:
      - golang
    steps:
      - go_install:
          - github.com/labstack/echo/v4@latest

  fiber:
    depends_on:
      - golang
    steps:
      - go_install:
          - github.com/gofiber/fiber/v2@latest

  # =============================================================================
  # Rust Frameworks
  # =============================================================================
  actix:
    depends_on:
      - rust
    steps:
      - cargo:
          - cargo-generate
      - custom_cmd:
          - echo "Use 'cargo new myapp && cd myapp && cargo add actix-web' to start"

  rocket:
    depends_on:
      - rust
    steps:
      - custom_cmd:
          - echo "Use 'cargo new myapp && cd myapp && cargo add rocket' to start"

  axum:
    depends_on:
      - rust
    steps:
      - custom_cmd:
          - echo "Use 'cargo new myapp && cd myapp && cargo add axum tokio' to start"

  # =============================================================================
  # .NET Frameworks
  # =============================================================================
  aspnet:
    depends_on:
      - csharp
    steps:
      - dotnet_tool:
          - dotnet-ef

  blazor:
    depends_on:
      - csharp
    steps:
      - custom_cmd:
          - echo "Blazor is included with dotnet-sdk"

  # =============================================================================
  # Ruby Frameworks
  # =============================================================================
  rails:
    depends_on:
      - ruby
    steps:
      - gem:
          - rails

  sinatra:
    depends_on:
      - ruby
    steps:
      - gem:
          - sinatra

  # =============================================================================
  # PHP Frameworks
  # =============================================================================
  laravel:
    depends_on:
      - php
    steps:
      - composer_global:
          - laravel/installer

  symfony:
    depends_on:
      - php
    steps:
      - composer_global:
          - symfony/cli

  # =============================================================================
  # Java/Kotlin Frameworks
  # =============================================================================
  spring:
    depends_on:
      - java
    steps:
      - system:
          - spring-boot-cli

  quarkus:
    depends_on:
      - java
    steps:
      - system:
          - quarkus-cli

  # =============================================================================
  # Dart/Flutter
  # =============================================================================
  flutter:
    depends_on:
      - dart
    steps:
      - custom_cmd:
          - flutter doctor